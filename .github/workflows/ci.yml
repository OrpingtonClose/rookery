name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Lint
        run: uv tool run ruff@0.8.0 check --output-format=github .
      - name: Format check
        run: uv tool run ruff@0.8.0 format --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.11
      - name: Install
        run: uv pip install --system -e ".[dev]"
      - name: Test
        run: pytest -v
